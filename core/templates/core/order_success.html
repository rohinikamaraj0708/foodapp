{% extends 'base.html' %}
{% block title %}Order Placed - FoodExpress{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
    <h2 class="fw-bold mt-3">Order Placed Successfully!</h2>
    <p class="text-muted">Your order #{{ order.id }} from {{ order.restaurant.name }} is being processed.</p>
    <h4 class="mt-3">Total Paid: Rs.{{ order.total_amount }}</h4>
    <div class="mt-4">
        <a href="{% url 'track_order' order.id %}" class="btn btn-primary btn-lg">Track Order</a>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg">Continue Ordering</a>
    </div>
</div>
{% endblock %}
