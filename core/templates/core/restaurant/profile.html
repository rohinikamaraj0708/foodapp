{% extends 'base.html' %}
{% block title %}Restaurant Profile - FoodExpress{% endblock %}
{% block content %}
<h2 class="fw-bold mb-4"><i class="bi bi-shop"></i> Restaurant Profile</h2>
<div class="card p-4">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
        {% for field in form %}
            <div class="col-md-6 mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
        {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
