{% extends 'base.html' %}
{% block title %}Rate Your Order - FoodExpress{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="fw-bold mb-3">Rate your order from {{ order.restaurant.name }}</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Rating</label>
                    {{ form.rating }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Comment</label>
                    {{ form.comment }}
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
